 GET by ID\napi.getPetById(petId).then(response =&gt; {\n  expect(response.status).to.eq(200);\n  expect(response.body.id).to.eq(petId);\n  expect(response.body.name).to.eq(this.petData.name);\n});\n// UPDATE\napi.updatePet({\n  id: petId,\n  name: this.petData.updatedName,\n  status: this.petData.updatedStatus\n}).then(response =&gt; {\n  expect(response.status).to.eq(200);\n  expect(response.body.status).to.eq(this.petData.updatedStatus);\n  expect(response.body.name).to.eq(this.petData.updatedName);\n});\n// FIND PET BY STATUS\napi.findPetsByStatus(this.petData.updatedStatus).then(response =&gt; {\n  expect(response.status).to.eq(200);\n  const petFound = response.body.some(pet =&gt; pet.id === petId);\n  expect(petFound).to.be.true;\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;d3e67635-44a5-443f-96c3-229c8ae4bbeb&quot;,&quot;parentUUID&quot;:&quot;1af208ed-c797-4755-97ea-ec67605ca4ef&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false}],&quot;suites&quot;:[],&quot;passes&quot;:[&quot;d3e67635-44a5-443f-96c3-229c8ae4bbeb&quot;],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:1147,&quot;root&quot;:false,&quot;rootEmpty&quot;:false,&quot;_timeout&quot;:2000}],&quot;passes&quot;:[],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:0,&quot;root&quot;:true,&quot;rootEmpty&quot;:true,&quot;_timeout&quot;:2000}],&quot;meta&quot;:{&quot;mocha&quot;:{&quot;version&quot;:&quot;7.2.0&quot;},&quot;mochawesome&quot;:{&quot;options&quot;:{&quot;quiet&quot;:false,&quot;reportFilename&quot;:&quot;mochawesome&quot;,&quot;saveHtml&quot;:true,&quot;saveJson&quot;:true,&quot;consoleReporter&quot;:&quot;spec&quot;,&quot;useInlineDiffs&quot;:false,&quot;code&quot;:true},&quot;version&quot;:&quot;7.1.4&quot;},&quot;marge&quot;:{&quot;options&quot;:{&quot;reportDir&quot;:&quot;reports/mochawesome&quot;,&quot;overwrite&quot;:false,&quot;html&quot;:true,&quot;json&quot;:true},&quot;version&quo
